apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: observability-demo
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s

    scrape_configs:
      - job_name: prometheus
        static_configs:
          - targets: ["localhost:9090"]

      - job_name: orders-api
        metrics_path: /wrong-metrics
        static_configs:
          - targets: ["orders-api:8080"]

      - job_name: otel-collector
        static_configs:
          - targets: ["otel-collector:8888"]
