apiVersion: apps/v1
kind: Deployment
metadata:
  name: orders-api
  namespace: observability-demo
spec:
  template:
    spec:
      containers:
        - name: orders-api
          readinessProbe:
            httpGet:
              path: /wrong-healthz
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
