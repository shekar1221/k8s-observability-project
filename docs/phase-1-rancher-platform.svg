<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Phase 1 Rancher managed Kubernetes platform</title>
  <desc id="desc">Rancher manages Kubernetes clusters, namespaces, RBAC, ingress, secrets, and observability workloads.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 Z" fill="#334155"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .title { font: 700 30px Arial, Helvetica, sans-serif; fill: #0f172a; }
      .subtitle { font: 16px Arial, Helvetica, sans-serif; fill: #475569; }
      .group { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; rx: 16; }
      .blue { fill: #e0f2fe; stroke: #0284c7; stroke-width: 2; rx: 12; }
      .green { fill: #dcfce7; stroke: #16a34a; stroke-width: 2; rx: 12; }
      .amber { fill: #fef3c7; stroke: #d97706; stroke-width: 2; rx: 12; }
      .text { font: 700 18px Arial, Helvetica, sans-serif; fill: #1e293b; }
      .small { font: 14px Arial, Helvetica, sans-serif; fill: #475569; }
      .edge { stroke: #334155; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>
  <rect class="bg" width="1280" height="720"/>
  <text x="48" y="58" class="title">Phase 1: Rancher Platform View</text>
  <text x="48" y="88" class="subtitle">Use this picture to explain the enterprise version of the lab. Rancher manages the Kubernetes clusters; the app and observability stack run inside the cluster.</text>

