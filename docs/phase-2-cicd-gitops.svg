<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Phase 2 CI CD and GitOps flow</title>
  <desc id="desc">Developer pushes code, CI scans and builds images, Argo CD syncs manifests to Rancher managed Kubernetes.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 Z" fill="#334155"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .title { font: 700 30px Arial, Helvetica, sans-serif; fill: #0f172a; }
      .subtitle { font: 16px Arial, Helvetica, sans-serif; fill: #475569; }
      .box { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; rx: 14; }
      .stage { fill: #e0f2fe; stroke: #0284c7; stroke-width: 2; rx: 12; }
      .scan { fill: #fee2e2; stroke: #dc2626; stroke-width: 2; rx: 12; }
      .deploy { fill: #dcfce7; stroke: #16a34a; stroke-width: 2; rx: 12; }
      .text { font: 700 17px Arial, Helvetica, sans-serif; fill: #1e293b; }
      .small { font: 14px Arial, Helvetica, sans-serif; fill: #475569; }
      .edge { stroke: #334155; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>
  <rect class="bg" width="1280" height="720"/>
  <text x="48" y="58" class="title">Phase 2: CI/CD and GitOps Flow</text>
  <text x="48" y="88" class="subtitle">Code changes go through validation and security checks before images are pushed and Argo CD deploys to the Rancher-managed cluster.</text>

  <rect x="58" y="170" width="166" height="82" class="stage"/>
  <text x="105" y="203" class="text">Developer</text>
  <text x="88" y="228" class="small">code change</text>

  <rect x="276" y="170" width="166" height="82" class="stage"/>
  <text x="331" y="203" class="text">Git Repo</text>
  <text x="313" y="228" class="small">source + YAML</text>

  <rect x="494" y="130" width="250" height="164" class="scan"/>
  <text x="572" y="166" class="text">CI Pipeline</text>
  <text x="532" y="196" class="small">kustomize validation</text>
  <text x="532" y="220" class="small">Trivy, Checkov, Gitleaks</text>
  <text x="532" y="244" class="small">Hadolint, Bandit, pip-audit</text>
  <text x="532" y="268" class="small">build container images</text>

  <rect x="804" y="170" width="170" height="82" class="stage"/>
  <text x="834" y="203" class="text">Registry</text>
  <text x="826" y="228" class="small">versioned images</text>

  <rect x="1030" y="120" width="190" height="132" class="deploy"/>
  <text x="1092" y="156" class="text">Argo CD</text>
  <text x="1060" y="186" class="small">detects Git change</text>
  <text x="1060" y="210" class="small">syncs desired state</text>
  <text x="1060" y="234" class="small">fixes drift</text>

  <rect x="350" y="430" width="580" height="110" class="box"/>
  <text x="514" y="468" class="text">Rancher-Managed Kubernetes Cluster</text>
  <text x="418" y="501" class="small">shopping services, MySQL, Redis, Prometheus, Grafana, Jaeger, Loki, EFK</text>

  <path d="M224 211 L276 211" class="edge"/>
  <path d="M442 211 L494 211" class="edge"/>
  <path d="M744 211 L804 211" class="edge"/>
  <path d="M974 211 L1030 186" class="edge"/>
  <path d="M1125 252 C1110 345 930 392 830 430" class="edge"/>
  <path d="M620 294 C620 350 620 382 620 430" class="edge"/>

  <text x="58" y="636" class="small">Interview line: My pipeline validates manifests, scans code and IaC, builds images, pushes to registry, and Argo CD deploys the desired state to Kubernetes.</text>
</svg>
