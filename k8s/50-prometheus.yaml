apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: observability-demo
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s

    scrape_configs:
      - job_name: prometheus
        static_configs:
          - targets: ["localhost:9090"]

      - job_name: orders-api
        metrics_path: /metrics
        static_configs:
          - targets: ["orders-api:8080"]

      - job_name: shopping-services
        metrics_path: /metrics
        static_configs:
          - targets:
              - "frontend:8080"
              - "user-api:8080"
              - "cart-api:8080"
              - "payment-api:8080"
              - "shipping-api:8080"

      - job_name: otel-collector
        static_configs:
          - targets: ["otel-collector:8888"]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: observability-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:v2.52.0
          args:
            - --config.file=/etc/prometheus/prometheus.yml
            - --storage.tsdb.path=/prometheus
          ports:
            - containerPort: 9090
              name: ui
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
      volumes:
        - name: config
          configMap:
            name: prometheus-config
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: observability-demo
spec:
  selector:
    app: prometheus
  ports:
    - name: ui
      port: 9090
      targetPort: 9090
