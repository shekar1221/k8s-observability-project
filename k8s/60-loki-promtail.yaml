apiVersion: v1
kind: ConfigMap
metadata:
  name: loki-config
  namespace: observability-demo
data:
  local-config.yaml: |
    auth_enabled: false

    server:
      http_listen_port: 3100

    common:
      path_prefix: /loki
      storage:
        filesystem:
          chunks_directory: /loki/chunks
          rules_directory: /loki/rules
      replication_factor: 1
      ring:
        kvstore:
          store: inmemory

    schema_config:
      configs:
        - from: 2024-01-01
          store: tsdb
          object_store: filesystem
          schema: v13
          index:
            prefix: index_
            period: 24h
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: loki
  namespace: observability-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: loki
  template:
    metadata:
      labels:
        app: loki
    spec:
      containers:
        - name: loki
          image: grafana/loki:3.0.0
          args: ["-config.file=/etc/loki/local-config.yaml"]
          ports:
            - containerPort: 3100
              name: http
          volumeMounts:
            - name: config
              mountPath: /etc/loki
      volumes:
        - name: config
          configMap:
            name: loki-config
---
apiVersion: v1
kind: Service
metadata:
  name: loki
  namespace: observability-demo
spec:
  selector:
    app: loki
  ports:
    - name: http
      port: 3100
      targetPort: 3100
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: promtail
  namespace: observability-demo
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: promtail-read
rules:
  - apiGroups: [""]
    resources:
      - nodes
      - nodes/proxy
      - services
      - endpoints
      - pods
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: promtail-read
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: promtail-read
subjects:
  - kind: ServiceAccount
    name: promtail
    namespace: observability-demo
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: promtail-config
  namespace: observability-demo
data:
  promtail.yaml: |
    server:
      http_listen_port: 9080
      grpc_listen_port: 0

    positions:
      filename: /tmp/positions.yaml

    clients:
      - url: http://loki:3100/loki/api/v1/push

    scrape_configs:
      - job_name: kubernetes-pods
        pipeline_stages:
          - cri: {}
        static_configs:
          - targets: [localhost]
            labels:
              job: kubernetes-pods
              namespace: observability-demo
              app: orders-api
              __path__: /var/log/pods/observability-demo_orders-api-*/*/*.log
          - targets: [localhost]
            labels:
              job: kubernetes-pods
              namespace: observability-demo
              app: frontend
              __path__: /var/log/pods/observability-demo_frontend-*/*/*.log
          - targets: [localhost]
            labels:
              job: kubernetes-pods
              namespace: observability-demo
              app: cart-api
              __path__: /var/log/pods/observability-demo_cart-api-*/*/*.log
          - targets: [localhost]
            labels:
              job: kubernetes-pods
              namespace: observability-demo
              app: user-api
              __path__: /var/log/pods/observability-demo_user-api-*/*/*.log
          - targets: [localhost]
            labels:
              job: kubernetes-pods
              namespace: observability-demo
              app: payment-api
              __path__: /var/log/pods/observability-demo_payment-api-*/*/*.log
          - targets: [localhost]
            labels:
              job: kubernetes-pods
              namespace: observability-demo
              app: shipping-api
              __path__: /var/log/pods/observability-demo_shipping-api-*/*/*.log
          - targets: [localhost]
            labels:
              job: kubernetes-pods
              namespace: observability-demo
              app: grafana
              __path__: /var/log/pods/observability-demo_grafana-*/*/*.log
          - targets: [localhost]
            labels:
              job: kubernetes-pods
              namespace: observability-demo
              app: prometheus
              __path__: /var/log/pods/observability-demo_prometheus-*/*/*.log
          - targets: [localhost]
            labels:
              job: kubernetes-pods
              namespace: observability-demo
              app: jaeger
              __path__: /var/log/pods/observability-demo_jaeger-*/*/*.log
          - targets: [localhost]
            labels:
              job: kubernetes-pods
              namespace: observability-demo
              app: loki
              __path__: /var/log/pods/observability-demo_loki-*/*/*.log
          - targets: [localhost]
            labels:
              job: kubernetes-pods
              namespace: observability-demo
              app: kibana
              __path__: /var/log/pods/observability-demo_kibana-*/*/*.log
          - targets: [localhost]
            labels:
              job: kubernetes-pods
              namespace: observability-demo
              app: elasticsearch
              __path__: /var/log/pods/observability-demo_elasticsearch-*/*/*.log
          - targets: [localhost]
            labels:
              job: kubernetes-pods
              namespace: observability-demo
              app: mysql
              __path__: /var/log/pods/observability-demo_mysql-*/*/*.log
          - targets: [localhost]
            labels:
              job: kubernetes-pods
              namespace: observability-demo
              app: redis
              __path__: /var/log/pods/observability-demo_redis-*/*/*.log
          - targets: [localhost]
            labels:
              job: kubernetes-pods
              namespace: observability-demo
              app: otel-collector
              __path__: /var/log/pods/observability-demo_otel-collector-*/*/*.log
          - targets: [localhost]
            labels:
              job: kubernetes-pods
              namespace: observability-demo
              app: fluent-bit
              __path__: /var/log/pods/observability-demo_fluent-bit-*/*/*.log
          - targets: [localhost]
            labels:
              job: kubernetes-pods
              namespace: observability-demo
              app: promtail
              __path__: /var/log/pods/observability-demo_promtail-*/*/*.log
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: promtail
  namespace: observability-demo
spec:
  selector:
    matchLabels:
      app: promtail
  template:
    metadata:
      labels:
        app: promtail
    spec:
      serviceAccountName: promtail
      containers:
        - name: promtail
          image: grafana/promtail:3.0.0
          args: ["-config.file=/etc/promtail/promtail.yaml"]
          volumeMounts:
            - name: config
              mountPath: /etc/promtail
            - name: pods
              mountPath: /var/log/pods
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: promtail-config
        - name: pods
          hostPath:
            path: /var/log/pods
