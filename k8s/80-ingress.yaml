apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: shopping-platform-ingress
  namespace: observability-demo
spec:
  ingressClassName: nginx
  rules:
    - host: shop.observability.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 8080
    - host: orders.observability.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: orders-api
                port:
                  number: 8080
    - host: cart.observability.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: cart-api
                port:
                  number: 8080
    - host: users.observability.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: user-api
                port:
                  number: 8080
    - host: payment.observability.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: payment-api
                port:
                  number: 8080
    - host: shipping.observability.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: shipping-api
                port:
                  number: 8080
    - host: grafana.observability.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: grafana
                port:
                  number: 3000
    - host: prometheus.observability.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: prometheus
                port:
                  number: 9090
    - host: jaeger.observability.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: jaeger
                port:
                  number: 16686
    - host: kibana.observability.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: kibana
                port:
                  number: 5601
    - host: loki.observability.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: loki
                port:
                  number: 3100
