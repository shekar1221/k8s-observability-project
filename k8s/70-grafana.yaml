apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: observability-demo
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        uid: prometheus
        type: prometheus
        access: proxy
        url: http://prometheus:9090
        isDefault: true
      - name: Loki
        uid: loki
        type: loki
        access: proxy
        url: http://loki:3100
      - name: Jaeger
        uid: jaeger
        type: jaeger
        access: proxy
        url: http://jaeger:16686
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards-provider
  namespace: observability-demo
data:
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: demo
        orgId: 1
        folder: Observability Demo
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-demo-dashboard
  namespace: observability-demo
data:
  orders-api.json: |
    {
      "title": "Shopping Cart API Metrics and Logs",
      "schemaVersion": 39,
      "version": 1,
      "refresh": "10s",
      "panels": [
        {
          "type": "timeseries",
          "title": "HTTP Requests by Endpoint",
          "gridPos": {"x": 0, "y": 0, "w": 12, "h": 8},
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "prometheus"},
              "expr": "sum(rate(orders_api_http_requests_total[1m])) by (endpoint)"
            }
          ]
        },
        {
          "type": "timeseries",
          "title": "P95 Latency",
          "gridPos": {"x": 12, "y": 0, "w": 12, "h": 8},
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "prometheus"},
              "expr": "histogram_quantile(0.95, sum(rate(orders_api_request_latency_seconds_bucket[5m])) by (le, endpoint))"
            }
          ]
        },
        {
          "type": "logs",
          "title": "Shopping Cart Logs from Loki",
          "gridPos": {"x": 0, "y": 8, "w": 24, "h": 10},
          "targets": [
            {
              "datasource": {"type": "loki", "uid": "loki"},
              "expr": "{app=\"orders-api\"} |= \"cart\""
            }
          ]
        }
      ]
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: observability-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:11.0.0
          env:
            - name: GF_SECURITY_ADMIN_USER
              value: admin
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: admin
            - name: GF_AUTH_ANONYMOUS_ENABLED
              value: "true"
            - name: GF_AUTH_ANONYMOUS_ORG_ROLE
              value: Admin
          ports:
            - containerPort: 3000
              name: ui
          volumeMounts:
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources
            - name: dashboards-provider
              mountPath: /etc/grafana/provisioning/dashboards
            - name: dashboard
              mountPath: /var/lib/grafana/dashboards
      volumes:
        - name: datasources
          configMap:
            name: grafana-datasources
        - name: dashboards-provider
          configMap:
            name: grafana-dashboards-provider
        - name: dashboard
          configMap:
            name: grafana-demo-dashboard
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: observability-demo
spec:
  selector:
    app: grafana
  ports:
    - name: ui
      port: 3000
      targetPort: 3000
