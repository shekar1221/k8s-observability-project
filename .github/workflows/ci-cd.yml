name: shopping-platform-ci-cd

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      run_e2e:
        description: "Run real API/Selenium tests against a deployed environment"
        required: true
        default: false
        type: boolean
      base_url:
        description: "Base URL for deployed frontend, for example http://shop.observability.local"
        required: false
        default: "http://shop.observability.local"
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: ${{ github.repository_owner }}
  JAVA_VERSION: "17"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-kubectl@v4
      - name: Render Kubernetes manifests
        run: kubectl kustomize k8s > /tmp/rendered.yaml
      - name: Python syntax check
        run: |
          python -m py_compile app/app.py
          python -m py_compile services/frontend/app.py
          python -m py_compile services/user-api/app.py
          python -m py_compile services/cart-api/app.py
          python -m py_compile services/payment-api/app.py
          python -m py_compile services/shipping-api/app.py

  java-tests:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Run Java JUnit tests
        run: mvn -f test-automation/pom.xml test

      - name: Upload JUnit reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: java-junit-reports
          path: test-automation/target/surefire-reports/

  security-scan:
    runs-on: ubuntu-latest
    needs: [validate, java-tests]
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: azure/setup-kubectl@v4

      - name: Render Kubernetes manifests
        run: kubectl kustomize k8s > rendered.yaml

      - name: Validate Kubernetes schemas with kubeconform
        uses: docker://ghcr.io/yannh/kubeconform:v0.6.7
        with:
          args: -strict -summary -ignore-missing-schemas /github/workspace/rendered.yaml

      - name: Scan Kubernetes YAML and repo filesystem with Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret,misconfig
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          format: table
          exit-code: 1

      - name: Scan IaC misconfigurations with Checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: .
          framework: kubernetes,github_actions,dockerfile
          quiet: true
          soft_fail: true

      - name: Secret scan with Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Lint Dockerfiles with Hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          recursive: true
          failure-threshold: error

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Python SAST with Bandit
        run: |
          python -m pip install --upgrade pip
          pip install bandit
          bandit -r app services interview-code -x "**/__pycache__" -ll

      - name: Python dependency audit
        run: |
          pip install pip-audit
          pip-audit -r app/requirements.txt
          pip-audit -r services/common/requirements.txt

  image-scan:
    runs-on: ubuntu-latest
    needs: security-scan
    permissions:
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: orders-api
            dockerfile: app/Dockerfile
            context: app
          - image: shopping-frontend
            dockerfile: services/frontend/Dockerfile
            context: .
          - image: user-api
            dockerfile: services/user-api/Dockerfile
            context: .
          - image: cart-api
            dockerfile: services/cart-api/Dockerfile
            context: .
          - image: payment-api
            dockerfile: services/payment-api/Dockerfile
            context: .
          - image: shipping-api
            dockerfile: services/shipping-api/Dockerfile
            context: .
    steps:
      - uses: actions/checkout@v4

      - name: Build image for vulnerability scan
        run: docker build -t ${{ matrix.image }}:ci-scan -f ${{ matrix.dockerfile }} ${{ matrix.context }}

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ matrix.image }}:ci-scan
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          format: table
          exit-code: 1

  e2e-tests:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'workflow_dispatch' && inputs.run_e2e == true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Run Cucumber REST API and Selenium tests
        run: mvn -f test-automation/pom.xml verify -DskipITs=false -DrunSelenium=true -DbaseUrl=${{ inputs.base_url }}

      - name: Upload E2E reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: java-e2e-reports
          path: |
            test-automation/target/failsafe-reports/
            test-automation/target/cucumber-reports/

  build:
    runs-on: ubuntu-latest
    needs: [validate, java-tests, security-scan, image-scan]
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - image: orders-api
            dockerfile: app/Dockerfile
            context: app
          - image: shopping-frontend
            dockerfile: services/frontend/Dockerfile
            context: .
          - image: user-api
            dockerfile: services/user-api/Dockerfile
            context: .
          - image: cart-api
            dockerfile: services/cart-api/Dockerfile
            context: .
          - image: payment-api
            dockerfile: services/payment-api/Dockerfile
            context: .
          - image: shipping-api
            dockerfile: services/shipping-api/Dockerfile
            context: .
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        if: github.event_name == 'push'
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: ${{ github.event_name == 'push' }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ matrix.image }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ matrix.image }}:latest
